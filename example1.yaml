likelihood:
  uvlf:
    class: UVLF_model2.UVLF
    python_path: .

    input_params:
      - alphastar_icept
      - betastar
      - epsilonstar_slope
      - epsilonstar_icept
      - Mc_slope
      - Mc_icept
      - alphastar_slope
      - sigma_MUV_hst
      - sigma_MUV_jwst

    output_params:
      - chi2_hst
      - chi2_jwst

    CV: 0.2        # cosmic variance floor added to data covmat
    z_max: 12.5   # max-z taken from JWST data file
    window: 'tophat'    # 'tophat' vs 'sharpk' window function used within Sheth-Tormen HMF evalutaion
    Anorm: 1.0    # multiply the paramters (A,q,c) of ST formula with Anorm, qnorm and cnorm to modify them. 
    qnorm: 1.0    # Default (A,q,c) values of ST are read from "UVLF_HST_ST_model2.data' file
    cnorm: 1.0
