likelihood:
  uvlf:
    class: UVLF_model2.UVLF
    python_path: .

    input_params:
      - alphastar_icept
      - betastar
      - epsilonstar_slope
      - epsilonstar_icept
      - Mc_slope
      - Mc_icept
      - alphastar_slope
